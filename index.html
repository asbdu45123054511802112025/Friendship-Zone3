<!DOCTYPE html>
<html>
  <head>
    <title>Registeration Page</title>
    <style>
      button{
        border-style:solid;
        
        border-radius:5px;
        color:white;
        background-color:green;
        height:35px;
      }
    </style>
  </head>
  <body>
    <img src="friends.jpeg" height="200px" width="350px">
    <center>
      <h1><b>Friendship Zone</b></h1>
    </center>
    <h3>Add your details to register</h3>
    <b>Name:</b><input type="text" placeholder="Enter Your Name" name="name"><br><br>
    <b>Email:</b><input type="mail" name="mail"><br><br>
   <b>Age:</b><input type="number" name="age"><br><br>
    <b>DOB:</b><input type="text" name="date"><br><br>
   <b> Gender:</b><input type="radio" value="Female" name="radio">
    Female
    <input type="radio" value="Male" name="radio">
    Male
    <br><br>
   <b> About:</b><textarea name="data" cols="50" rows="5">
    </textarea><br><br>
   <b> Phone:</b><input type="text" name="phone"><br><br>
    <b>Interested in:</b><input type="checkbox" value="Friendship" name="Friendship">Friendship
    <input type="checkbox" value="Dating" name="Dating">Dating
    <b>Attachment:</b><input type="button" value="Choose Files" name="button">
    <input type="button" value="No file Choosen " name="button">
    <br><br>
    <button onclick="goToNextPage()">Register</button>
    <button onclick="goToRegister()">Register as Admin</button>
    <script>
      function goToNextPage()
      {
        window.location.href="https://asbdu45123054511802112025.github.io/Friendship-Zone4/";
      }
      function goToRegister()
      {
        window.location.href="https://asbdu45123054511802112025.github.io/Friendship-Zone5/";
      }
    </script>
    
    
    
  </body>
</html>
