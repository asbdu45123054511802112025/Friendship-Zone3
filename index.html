      button{

    Female
    <input type="radio" value="Male" name="radio">
    Male
    <br><br>
   <b> About:</b><textarea name="data" cols="50" rows="5">
    </textarea><br><br>
   <b> Phone:</b><input type="text" name="phone"><br><br>

    <input type="checkbox" value="Dating" name="Dating">Dating
    <b>Attachment:</b><input type="button" value="Choose Files" name="button">
    <input type="button" value="No file Choosen " name="button">
    <br><br>
    <button><a href="https://asbdu45123054511802112025.github.io/Friendship-Zone4/">Register</a></button>
